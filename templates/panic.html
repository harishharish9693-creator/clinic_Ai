<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panic Button Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-gradient: linear-gradient(135deg,#f8a5c2,#63cdda);
    --btn-red: #e74c3c;
    --btn-red-hover: #c0392b;
    --card-bg: rgba(255,255,255,0.95);
    --accent: #10b981;
    --shadow: 0 8px 24px rgba(0,0,0,0.15);
    --muted: #555;
  }

  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-gradient);
    color: #111;
  }

  .container {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 20px;
    box-shadow: var(--shadow);
    max-width: 450px;
    width: 90%;
    text-align: center;
  }

  h2 {
    color: var(--accent);
    margin-bottom: 30px;
    font-size: 1.8rem;
  }

  #panicBtn {
    background: var(--btn-red);
    color: white;
    padding: 18px 35px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  }

  #panicBtn:hover {
    background: var(--btn-red-hover);
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
  }

  #status {
    margin-top: 20px;
    font-size: 1.1rem;
    color: var(--muted);
  }

  /* Music Player */
  #musicSection {
    margin-top: 30px;
  }

  #musicList {
    list-style: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #musicList li {
    background: #d1f2eb;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.3s;
    text-align: center;
  }

  #musicList li:hover {
    background: #a2e4d0;
    color: #057d6f;
    transform: translateX(3px);
  }

  audio {
    width: 100%;
    margin-top: 10px;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div class="container">
  <h2>🚨 Patient Safety Dashboard</h2>
  <button id="panicBtn">Panic Button</button>
  <p id="status">Monitoring...</p>

  <!-- Music Section -->
  <div id="musicSection">
    <h3>Background Music</h3>
    <ul id="musicList"></ul>
    <audio id="audioPlayer" controls></audio>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const API_KEY = "replace_frontend_api_key_here"; // match backend

  let lastPosition = null;
  let idleTimer = null;

  const socket = io();
  socket.on("panic-alert", data => {
    alert("🚨 EMERGENCY: " + data.alert + "\nPatient: " + (data.patient_name || "Unknown"));
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
    audio.play();
  });

  function sendAlert(reason) {
    const msg = {
      location: lastPosition || "0,0",
      alert: reason,
      patient_name: "Test Patient",
      timestamp: new Date().toISOString()
    };
    fetch("/send-alert", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY
      },
      body: JSON.stringify(msg)
    }).then(r => r.json()).then(resp => {
      document.getElementById("status").innerText = "🚨 Alert sent!";
    });
  }

  document.getElementById("panicBtn").addEventListener("click", () => {
    sendAlert("Manual Panic Button Pressed");
  });

  function trackLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const coords = pos.coords.latitude + "," + pos.coords.longitude;
        if (lastPosition && lastPosition === coords) {
          if (!idleTimer) {
            idleTimer = setTimeout(() => sendAlert("Patient idle >5min"), 5*60*1000);
          }
        } else {
          clearTimeout(idleTimer);
          idleTimer = null;
        }
        lastPosition = coords;
      });
    }
  }
  setInterval(trackLocation, 30000);

  // ========== MUSIC PLAYER ==========
  const musicListData = [
    {title:"Relaxing Piano", file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
    {title:"Soft Guitar", file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
    {title:"Ambient Music", file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
    {title:"Calm Morning", file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"}
  ];

  const musicUl = document.getElementById("musicList");
  const audioPlayer = document.getElementById("audioPlayer");

  musicListData.forEach(song => {
    const li = document.createElement("li");
    li.textContent = song.title;
    li.addEventListener("click", () => {
      audioPlayer.src = song.file;
      audioPlayer.play();
    });
    musicUl.appendChild(li);
  });
</script>

</body>
</html>
