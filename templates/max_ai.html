<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAX AI Voice Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6423aa 0%, #6b8dc8 100%);
      min-height: 100vh;
      color: #fff;
    }

    /* Navbar */
    .header {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.6rem 1rem;
    }
    .header .navbar-brand {
      font-size: 1.4rem;
      color: #495c7d;
    }
    .header .nav-link {
      color: #333;
      font-weight: 500;
      transition: color 0.3s;
    }
    .header .nav-link:hover {
      color: #2575fc;
    }
    .btn-getstarted {
      background: #2575fc;
      color: #fff;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      text-decoration: none;
    }
    .btn-getstarted:hover {
      background: #1e63d9;
      color: #fff;
    }

    /* Voice Assistant Section */
    main {
      margin-top: 120px;
    }
    h2 {
      font-weight: 700;
      color: #fff;
    }
    .btn-lg {
      padding: 0.75rem 2rem;
      font-size: 1.2rem;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-lg:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    /* Glass effect info boxes */
    .info-box {
      max-width: 650px;
      margin: 1rem auto;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: left;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .info-box h5 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      color: #ffe082;
    }
    .info-box p {
      font-size: 0.95rem;
      color: #fff;
      min-height: 40px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header id="header" class="header d-flex align-items-center fixed-top shadow-sm">
    <div class="container-fluid d-flex align-items-center justify-content-between">
      <a href="/index" class="navbar-brand fw-bold">MAX CMR</a>
      <nav>
        <ul class="nav">
          <li class="nav-item"><a href="/index" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="/appointment" class="nav-link">Appointment</a></li>
          <li class="nav-item"><a href="/family" class="nav-link">Family Contacts</a></li>
          <li class="nav-item"><a href="/panic" class="nav-link">Panic</a></li>
          <li class="nav-item"><a href="/dementia" class="nav-link">Dementia Type</a></li>
          <li class="nav-item d-flex align-items-center gap-2">
            <span class="text-muted" style="font-size: .9rem;">Language</span>
            <select id="langSelect" class="form-select form-select-sm" style="width:auto">
              <option value="en">English</option>
              <option value="hi">हिन्दी</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
            </select>
          </li>
        </ul>
      </nav>
      <a class="btn-getstarted" href="/max_ai">MAX AI</a>
    </div>
  </header>

  <!-- Voice Assistant Section -->
  <main class="container text-center">
    <h2 class="mb-4">🎙️ MAX AI Voice Assistant</h2>
    <div class="d-flex justify-content-center gap-3 mb-4">
      <button id="startBtn" class="btn btn-success btn-lg">Start Max</button>
      <button id="stopBtn" class="btn btn-danger btn-lg">Stop Max</button>
    </div>
    
    <div class="info-box">
      <h5>Recognized Speech:</h5>
      <p id="speechText"></p>
    </div>
    
    <div class="info-box">
      <h5>AI Response:</h5>
      <p id="aiResponse"></p>
    </div>
  </main>

  <div id="google_translate_element" style="display:none;"></div>
  <script>
    function googleTranslateElementInit(){
      new google.translate.TranslateElement({pageLanguage:'en', includedLanguages:'en,hi,es,fr,de', autoDisplay:false}, 'google_translate_element');
    }
    (function(){
      const setLang = (lang) => {
        const iframe = document.querySelector('iframe.goog-te-menu-frame');
        if (!iframe) { setTimeout(() => setLang(lang), 300); return; }
        const innerDoc = iframe.contentDocument || iframe.contentWindow.document;
        innerDoc.querySelectorAll('a.goog-te-menu2-item').forEach(a=>{
          if (a.getAttribute('data-language-code') === lang) a.click();
        });
      };
      const selectEl = document.getElementById('langSelect');
      if (selectEl) {
        const saved = localStorage.getItem('site_lang');
        if (saved) selectEl.value = saved;
        selectEl.addEventListener('change', function(){
          const lang = this.value; localStorage.setItem('site_lang', lang); setLang(lang);
        });
        if (saved) setTimeout(()=> setLang(saved), 800);
      }
    })();
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script>
    let recognition;
    const speechText = document.getElementById("speechText");
    const aiResponse = document.getElementById("aiResponse");

    if ("webkitSpeechRecognition" in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = "en-US";

      recognition.onresult = async function(event) {
        const transcript = event.results[0][0].transcript;
        speechText.textContent = transcript;

        const response = await fetch("/api/ask_max", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: transcript })
        });

        const data = await response.json();
        aiResponse.textContent = data.reply;

        const utterance = new SpeechSynthesisUtterance(data.reply);
        speechSynthesis.speak(utterance);
      };

      recognition.onerror = function(event) {
        console.error("Speech recognition error", event.error);
      };

      document.getElementById("startBtn").onclick = () => recognition.start();
      document.getElementById("stopBtn").onclick = () => recognition.stop();
    } else {
      alert("Your browser does not support speech recognition.");
    }
  </script>

</body>
</html>
